id: dev.taskfile.Task
default-branch: stable
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: task
build-options:
  strip: true
cleanup-commands:
  - mkdir --parents ${FLATPAK_DEST}/tools
finish-args:
  - --filesystem=xdg-run/podman
  - --env=PATH=/app/tools/toolbx/bin:/app/tools/podman/bin:/app/bin:/usr/bin
modules:
  - name: task
    buildsystem: simple
    build-commands:
      - install -D task ${FLATPAK_DEST}/bin/task
    sources:
      - type: archive
        url: https://github.com/go-task/task/releases/download/v3.51.1/task_linux_amd64.tar.gz
        sha256: da7e92f0ff961ef2aae7cfecbad8d1fd2a08d7b09ba968673adf7ff389b243b5
        strip-components: 0

# Bundling podman-remote is simpler but I'm leaving extensions here as an example and in case more are needed.
add-extensions:
  dev.taskfile.Task.tool:
    directory: tools
    version: stable
    subdirectories: true
